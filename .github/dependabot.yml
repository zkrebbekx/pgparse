version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    groups:
      go-deps:
        patterns: ["*"]
  - package-ecosystem: gomod
    directory: "/comparison"
    schedule:
      interval: weekly
    groups:
      go-deps:
        patterns: ["*"]
  - package-ecosystem: gomod
    directory: "/playground"
    schedule:
      interval: weekly
    groups:
      go-deps:
        patterns: ["*"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
